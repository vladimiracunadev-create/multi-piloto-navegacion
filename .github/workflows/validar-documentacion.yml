name: Validar documentacion

# Valida en cada cambio que el repositorio documental sigue integro:
# estructura de vehiculos y secciones, enlaces internos resueltos, estilo de
# Markdown consistente y workflows seguros. Todos los jobs deben quedar en verde.
#
# Endurecimiento aplicado (ver docs y otros repos del autor):
#   - Acciones de terceros pineadas por SHA de commit.
#   - permissions: contents: read (minimo) a nivel de workflow.
#   - persist-credentials: false en cada checkout (no deja el token en .git).
#   - timeout-minutes por job (corta jobs colgados).
#   - actionlint + zizmor auditan los propios workflows.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  estructura:
    name: Estructura y enlaces internos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validar estructura y enlaces internos
        run: python scripts/validar_estructura.py

      - name: Resumen
        if: always()
        run: |
          {
            echo "### Programa de Operacion y Simulacion de Maquinas"
            echo ""
            echo "- Vehiculos: **$(find vehiculos -mindepth 1 -maxdepth 1 -type d | wc -l)**"
            echo "- Documentos Markdown: **$(find . -name '*.md' -not -path './node_modules/*' | wc -l)**"
          } >> "$GITHUB_STEP_SUMMARY"

  markdown:
    name: Estilo de Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Accion oficial del mantenedor de markdownlint; lee la config
      # .markdownlint-cli2.jsonc del repositorio de forma automatica.
      - name: Lint de Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: "**/*.md"

  workflows:
    name: Auditoria de workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Instalar actionlint (script pineado por SHA, no main)
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Ejecutar actionlint
        run: ./actionlint -color

      # advanced-security: false + annotations: true evita subir SARIF (que
      # requeriria security-events: write) y muestra hallazgos como anotaciones.
      - name: Auditar workflows con zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          inputs: .github/workflows/
          online-audits: false
          persona: regular
          advanced-security: false
          annotations: true
