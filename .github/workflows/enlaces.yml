name: Verificar enlaces

# Comprueba enlaces internos y externos de toda la documentacion con lychee.
# Se ejecuta en Pull Requests, de forma programada (semanal) y manualmente,
# pero NO en cada push a main: asi la validacion principal nunca se bloquea por
# la caida transitoria de un sitio externo (por ejemplo, portales de gobierno).

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Enlaces internos y externos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Comprobar enlaces con lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # Usa .lycheeignore para dominios que bloquean bots. Acepta 429
          # (rate-limit) para no romper el build por limites externos.
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,206,429
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
